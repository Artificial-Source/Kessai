name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint, typecheck, format check
        run: pnpm check

      - name: Unit and component tests
        run: pnpm test:run

      - name: Dependency audit
        run: pnpm audit --prod --audit-level=high

  # E2E tests require a running Tauri app with a display server (Xvfb/WebKitGTK).
  # Full Playwright E2E cannot run in a standard GitHub Actions environment without
  # a virtual display and the full Tauri build (~10 min). This job runs a dedicated
  # web smoke spec that uses base Playwright (no mocked Tauri internals).
  e2e-ready:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: npx playwright install --with-deps chromium
      # E2E tests require a running Tauri app with display server.
      # Run dedicated real-web smoke coverage against the web backend path.
      - run: pnpm test:e2e:web-smoke

  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Run Rust tests
        run: cargo test --workspace
