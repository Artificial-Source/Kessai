name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --reporter=silent

      - name: Read release notes
        id: release_notes
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes_file="$RUNNER_TEMP/release-notes.md"
          node scripts/extract-release-notes.js "$version" > "$notes_file"

          {
            echo 'body<<EOF'
            cat "$notes_file"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and publish desktop artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Kessai v__VERSION__'
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  publish-mcp:
    needs: publish-tauri
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive_extension: tar.gz
            binary_extension: ''
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            archive_extension: zip
            binary_extension: .exe
          - platform: macos-latest
            target: x86_64-apple-darwin
            archive_extension: tar.gz
            binary_extension: ''
          - platform: macos-latest
            target: aarch64-apple-darwin
            archive_extension: tar.gz
            binary_extension: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './ -> target'

      - name: Build kessai-mcp
        shell: bash
        run: cargo build --release -p kessai-mcp --target "${{ matrix.target }}"

      - name: Package kessai-mcp (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.Substring(1)
          $packageDir = "kessai-mcp-$version-${{ matrix.target }}"
          $binaryName = "kessai-mcp${{ matrix.binary_extension }}"
          $tempPackageDir = Join-Path $env:RUNNER_TEMP $packageDir
          New-Item -ItemType Directory -Force -Path $tempPackageDir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/$binaryName" "$tempPackageDir/$binaryName"
          $archivePath = Join-Path $env:RUNNER_TEMP "$packageDir.zip"
          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }
          Compress-Archive -Path $tempPackageDir -DestinationPath $archivePath
          "archive_path=$archivePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Package kessai-mcp (Unix)
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          package_dir="kessai-mcp-${version}-${{ matrix.target }}"
          binary_name="kessai-mcp${{ matrix.binary_extension }}"
          mkdir -p "$RUNNER_TEMP/$package_dir"
          cp "target/${{ matrix.target }}/release/$binary_name" "$RUNNER_TEMP/$package_dir/$binary_name"

          archive_path="$RUNNER_TEMP/$package_dir.tar.gz"
          tar -C "$RUNNER_TEMP" -czf "$archive_path" "$package_dir"

          echo "archive_path=$archive_path" >> "$GITHUB_ENV"

      - name: Upload kessai-mcp release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.archive_path }}
